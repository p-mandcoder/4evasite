<!DOCTYPE html>
<html>
    <head>
        <title>4eva-profile page</title>
        <link rel="stylesheet" href="4eva header.css">
        <link rel="stylesheet" href="4eva signup/4eva signup page.css">
        <link rel="stylesheet" href="4eva products.css">
        <link rel="stylesheet" href="4eva_heropage.css">
        <link rel="stylesheet" href="4eva_profile.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    </head>
    <body>
        <div class="container">
            <div class="header">
                 
                  <div class="home-button-div">
                    <a href="4eva_heropage.html" class="a-buttons">
                        <img src="Home icon.png" class="home-button-pic">
                        <button class="home-button">Home</button>
                    </a>
                  </div> 
                   <div class="product-button-div">
                      <a href="4eva product page.html" class=" a-buttons">
                        <img src="box.png" class="product-button-pic">
                        <button class="product-button">Products</button>
                    </a>
                  </div>
                  <div class="purchase-button-div">
                     <a href="4eva- purchase page.html" class="a-buttons">
                        <img src="cart.png" class="purchase-button-pic">
                        <button class="purchase-button">Purchases</button>
                    </a> 
                  </div>
                  <div class="personal-button-div">
                     <a href="4eva_profile.html" class="a-buttons">
                        <img src="user.png" class="personal-button-pic">
                        <button class="personal-button">Personal</button>
                    </a>
                  </div>

            </div>
            <div class="profile-box-div">
                <div class="profile-pic-div">
                        <img src="profile-pic.webp" class="profile-pic">
                </div> 
                <div class="user-details">
                    <div>
                            <p class="user-name">(User Name)</p>
                            <p class="user-id">(User ID)</p>
                            <p class="money-available">#Money Available</p>
                    </div>
                            <p class="level">level</p>
                </div>
            </div>
            <div class="transactions-div">
                <div class="withdrawal-div">
                    <a href="4eva-withdrawal.html" class="withdrawal-a"> <button class="withdrawal-button">Withdrawal ></button></a>
                </div>
                <div class="recharge-div">
                    <button class="recharge-button">Recharge ></button>
                </div>
                <div class="transaction-history-div">
                    <button class="transaction-history-button">Transaction History ></button>
                </div>
            </div>
            <div class="settings-div">
                <a class="settings-a">
                   <button class="settings-button">Settings</button>
                </a>
                <a class="bank-account-a" href="4eva-account-details.html">
                    <button class="BA-button">Bank Account</button>
                </a>
                <a class="sign-out-a">
                    <button class="sign-out-button">Sign Out</button>
                </a>
            </div>
       
       
       
        </div>
    </body>
</html>
